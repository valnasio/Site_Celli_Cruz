

services:
  # ============================================================
  # NGINX - Load Balancer & Reverse Proxy
  # ============================================================
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: celli_cruz_nginx
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl
      - ./webroot:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - app1
      - app2
    networks:
      - celli_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # APLICAÇÃO - Réplica 1
  # ============================================================
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celli_cruz_app1
    ports:
      - "8001:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - INSTANCE_NAME=app1
    volumes:
      # Volume compartilhado para dados
      - app_data:/app/data
      - app_uploads:/app/assets/uploads
    networks:
      - celli_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Limites de recursos
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - data_sync

  # ============================================================
  # APLICAÇÃO - Réplica 2
  # ============================================================
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celli_cruz_app2
    ports:
      - "8002:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - INSTANCE_NAME=app2
    volumes:
      # Volume compartilhado para dados
      - app_data:/app/data
      - app_uploads:/app/assets/uploads
    networks:
      - celli_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Limites de recursos
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - data_sync

  # ============================================================
  # DATA SYNC - Sincroniza dados entre replicas
  # ============================================================
  data_sync:
    image: busybox:latest
    container_name: celli_cruz_data_sync
    volumes:
      - app_data:/app/data
      - app_uploads:/app/assets/uploads
    command: sh -c "mkdir -p /app/data /app/assets/uploads && while true; do sleep 3600; done"
    networks:
      - celli_network
    restart: unless-stopped

# ============================================================
# NETWORKS
# ============================================================
networks:
  celli_network:
    driver: bridge

# ============================================================
# VOLUMES
# ============================================================
volumes:
  app_data:
    driver: local
  app_uploads:
    driver: local
